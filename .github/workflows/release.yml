name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        run: ./scripts/build-app.sh
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Update version in Info.plist and re-sign
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" build/AudioInput.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" build/AudioInput.app/Contents/Info.plist
          codesign --force --sign - --identifier "com.nyosegawa.audio-input" build/AudioInput.app/Contents/MacOS/AudioInput

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 build/AudioInput.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/AudioInput.dmg
          generate_release_notes: true
          body: |
            ## Install

            ### Homebrew
            ```
            brew install nyosegawa/tap/audio-input
            ```

            ### Manual
            1. Download `AudioInput.dmg`
            2. Drag `AudioInput.app` to Applications
            3. Run: `xattr -cr /Applications/AudioInput.app`

            **SHA256:** `${{ steps.sha.outputs.sha256 }}`

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/nyosegawa/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/audio-input.rb
          sed -i '' "s/sha256 .*/sha256 \"${SHA256}\"/" Casks/audio-input.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/audio-input.rb
          git commit -m "Bump audio-input to v${VERSION}"
          git push
